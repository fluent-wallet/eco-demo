<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eco-demo 本地调试</title>
    <style>
      :root {
        color: #172033;
        background: #f6f7fb;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(1280px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        margin: 8px 0 0;
        color: #5c667a;
        line-height: 1.6;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      a {
        display: inline-flex;
        min-height: 38px;
        align-items: center;
        border: 1px solid #d7ddeb;
        border-radius: 8px;
        background: #fff;
        color: #172033;
        padding: 0 14px;
        text-decoration: none;
      }

      a:hover {
        border-color: #5661c9;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .preview {
        min-width: 0;
        overflow: hidden;
        border: 1px solid #dfe5ef;
        border-radius: 8px;
        background: #101418;
      }

      .preview-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border-bottom: 1px solid #dfe5ef;
        background: #fff;
        padding: 12px;
      }

      .preview-title h2 {
        margin: 0;
        font-size: 15px;
        letter-spacing: 0;
      }

      iframe {
        display: block;
        width: 100%;
        height: min(760px, calc(100vh - 160px));
        border: 0;
      }

      @media (max-width: 1000px) {
        header,
        .grid {
          grid-template-columns: 1fr;
        }

        header {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>eco-demo 本地调试</h1>
          <p>这里直接加载各 demo 的开发服务，修改源码后刷新页面即可看到最新效果。</p>
        </div>
        <nav class="actions">
          <a href="/eip-4337/">打开 4337</a>
          <a href="/eip-7702/">打开 7702</a>
        </nav>
      </header>

      <section class="grid">
        <article class="preview">
          <div class="preview-title">
            <h2>EIP-4337 + EIP-7702 Demo</h2>
            <a href="/eip-4337/">全屏查看</a>
          </div>
          <iframe src="http://127.0.0.1:5173/" title="EIP-4337 demo"></iframe>
        </article>
        <article class="preview">
          <div class="preview-title">
            <h2>EIP-7702 Demo</h2>
            <a href="/eip-7702/">全屏查看</a>
          </div>
          <iframe src="http://127.0.0.1:3008/" title="EIP-7702 demo"></iframe>
        </article>
      </section>
    </main>
  </body>
</html>
